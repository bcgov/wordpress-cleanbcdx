name: List Backups V2
on:
  workflow_dispatch:
    inputs:
      project-name:
        description: 'Project'
        required: true
        type: choice
        options:      
        - cleanbcdx-bh
        - cleanbcdx-ge
        - cleanbcdx-bb
        - cleanbc
        default: 'cleanbcdx-bh'

      site-name:
        description: 'Site name'
        required: true
        default: 'prod'
jobs:
  deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
          
      - name: Install Rclone
        run: |
          if command -v rclone &> /dev/null; then
            echo "rclone is already installed"
          else
            echo "rclone not found, installing..."
            sudo -v ; curl https://rclone.org/install.sh | sudo bash ; rclone config touch
          fi
        shell: bash

      - name: Verify Installation
        run: rclone version
        shell: bash

      - name: Install OC CLI
        run: |
          curl -LO https://mirror.openshift.com/pub/openshift-v4/clients/ocp/latest/openshift-client-linux.tar.gz
          tar xvzf openshift-client-linux.tar.gz
          sudo mv oc kubectl /usr/local/bin/

      - name: Get list of backups
        run: |
          PROJECT_NAME=${{ github.event.inputs.project-name }}
          SITE_NAME=${{ github.event.inputs.site-name }}
          ENVIRONMENT=prod
          NAMESPACE="f181a8-$ENVIRONMENT"


          echo "Getting list of backups for ${PROJECT_NAME}"
          echo "Searching for: ${PROJECT_NAME}-${SITE_NAME}_${ENVIRONMENT}_*_backup.tar*"

          
          # Log in to OpenShift
          echo "::group::Login to target OC"
          #Sometimes oc login will fail to connect, so lets re-try on failure.
          set +e
          oc login ${{ secrets.OPENSHIFT_SERVER }} --token=${{ secrets.OPENSHIFT_TOOLS_API_TOKEN  }}
          ret=$?
          set -e
          if [ $ret -eq 0 ]; then
              # The command was successful
              echo "Login successful"

          else
              echo "Re-trying oc-login in 10s..."

              sleep 10

              # The command was not successful, lets try again
              oc login ${{ secrets.OPENSHIFT_SERVER }} --token=${{ secrets.OPENSHIFT_TOOLS_API_TOKEN  }}

          fi

          echo "::endgroup::"

          
          CMD_RESULTS=$(rclone lsf :s3:clbcdx/oc-sites-bk --include "${PROJECT_NAME}-${SITE_NAME}_${ENVIRONMENT}_*_backup.tar*" --files-only --s3-provider Other --s3-access-key-id "nr-cleanbcdx-pr" --s3-secret-access-key "${{ secrets.BCGOV_S3_SECRET_ACCESS_KEY }}" --s3-endpoint "https://nrs.objectstore.gov.bc.ca"  --contimeout "15s" --retries 3 | sort | tail -n 20)

          echo "$CMD_RESULTS"
          
          if [ -z "$CMD_RESULTS" ]; then
              echo "::error::Unknown backup file name: ${CMD_RESULTS}"

              exit 96
          fi 

          BACKUP_LIST=$CMD_RESULTS | sort -r | nl

          #Generate GH Actions summary
          echo "### Backups List:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY # this is a blank line
          echo "Starting at backup #1 and increasing down the list." >> $GITHUB_STEP_SUMMARY
          echo "${BACKUP_LIST}" >> $GITHUB_STEP_SUMMARY
